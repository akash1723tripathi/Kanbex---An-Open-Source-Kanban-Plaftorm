services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kanbex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanbex
      POSTGRES_PASSWORD: kanbex_secret
      POSTGRES_DB: kanbex_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kanbex -d kanbex_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kanbex-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - Database Management UI
  adminer:
    image: adminer:latest
    container_name: kanbex-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: kanbex-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://neondb_owner:npg_ryag6FVK8YbI@ep-odd-waterfall-aog5r1v9.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kanbex-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      WATCHPACK_POLLING: 'true'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
